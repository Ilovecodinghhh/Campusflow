<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CampusFlow V1.3 试点交付版</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div class="brand">
          <img class="brand-logo" src="./logo.png" alt="CampusFlow — 智慧校园空间调度" width="1408" height="768">
          <div class="brand-meta">
            <span class="brand-version">V1.3 试点交付版</span>
            <p>试点配置中心 · 模拟导入校验 · 自动报告导出</p>
          </div>
        </div>
        <div class="server-state">
          <span id="serverStatus">连接中</span>
          <strong id="activeRole">学生</strong>
        </div>
      </header>

      <section class="presentation-strip">
        <div>
          <span class="eyebrow">答辩演示</span>
          <strong id="presentationTitle">3 分钟演示</strong>
          <p id="presentationPoint">按主链路展示角色切换、试点配置、导入校验和报告导出。</p>
        </div>
        <div class="presentation-actions">
          <button class="ghost" id="mode3" type="button">3 分钟</button>
          <button class="primary small" id="nextStep" type="button">下一步</button>
          <button class="ghost" id="focusMode" type="button">演示视图</button>
          <button class="ghost danger" id="resetDemo" type="button">重置演示</button>
        </div>
        <div class="step-track" id="stepTrack"></div>
      </section>

      <section class="workspace">
        <aside class="pane left-pane">
          <div class="pane-inner">
            <div class="section-title">
              <h2>角色工作台</h2>
              <span>RBAC</span>
            </div>
            <nav class="role-tabs" id="roleTabs"></nav>
            <div class="prompt-list" id="promptList"></div>
            <label class="field">
              <span>当前指令</span>
              <textarea id="queryInput"></textarea>
            </label>
            <div class="button-row">
              <button class="primary" id="runButton" type="button">执行</button>
              <button class="ghost" id="submitButton" type="button">提交申请</button>
            </div>

            <section class="workflow-card">
              <div class="section-title compact">
                <h3>AI 工作流</h3>
                <span>可追踪</span>
              </div>
              <ol id="workflowSteps"></ol>
            </section>

            <details>
              <summary>结构化输出</summary>
              <pre id="parsedOutput"></pre>
            </details>
          </div>
        </aside>

        <section class="pane result-pane">
          <div class="pane-inner">
            <div id="resultPanel"></div>
          </div>
        </section>
      </section>
    </main>
    <script src="./app.js"></script>
  </body>
</html>
